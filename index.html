  <style>
    body { 
      margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background-color: #050505; color: #fff; display: flex; flex-direction: column; min-height: 100vh; overflow: hidden;
    }

    /* 上部の警告帯：アダルト感と緊急性 */
    .age-restriction-bar {
      background: #e02424; color: #fff; font-weight: 900; font-size: 11px;
      padding: 6px 0; text-align: center; letter-spacing: 2px; text-transform: uppercase;
    }

    /* gofile風のダークヘッダー */
    .header-bar { 
      background: #111; border-bottom: 1px solid #222; padding: 15px; text-align: center; 
      display: flex; justify-content: center; align-items: center; gap: 6px;
    }
    .logo-text { font-size: 22px; font-weight: 900; letter-spacing: -1px; }
    .logo-text span { color: #2563eb; } /* gofileのアクセントカラー */

    .main-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
    
    .video-card {
      background: #111; border: 1px solid #333; border-radius: 12px; padding: 30px; 
      max-width: 420px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,1); text-align: center;
      position: relative;
    }

    .status-dot {
      display: inline-flex; align-items: center; background: rgba(224, 36, 36, 0.1); 
      color: #e02424; font-size: 11px; font-weight: bold; padding: 4px 10px; 
      border-radius: 4px; margin-bottom: 20px; border: 1px solid #e02424;
    }
    .status-dot::before {
      content: ""; width: 8px; height: 8px; background: #e02424; border-radius: 50%; 
      margin-right: 6px; animation: blink 0.8s infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .news-title { font-size: 20px; font-weight: 800; line-height: 1.4; margin-bottom: 10px; color: #fff; }
    .news-desc { color: #666; font-size: 13px; margin-bottom: 30px; }

    /* 読み込みセクション：アプリ連動を強調 */
    .loader-section { 
      padding: 20px; background: #000; border-radius: 8px; border: 1px solid #222;
    }
    .spinner {
      border: 3px solid #222; border-top: 3px solid #2563eb; border-radius: 50%;
      width: 28px; height: 28px; animation: spin 0.8s linear infinite; margin: 0 auto 15px;
    }
    .loading-text { font-size: 16px; font-weight: bold; color: #fff; }
    .auth-sub { font-size: 12px; color: #444; margin-top: 6px; }
    
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* TikTok Liteへの強力な誘導ボタン（偽装） */
    .fake-btn {
      margin-top: 20px; background: #fff; color: #000; padding: 12px 0;
      width: 100%; border-radius: 6px; font-weight: 900; font-size: 15px;
    }
